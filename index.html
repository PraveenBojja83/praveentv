<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Praveen-IPTV Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- External stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="logo">
        <img src="resource/logo1.png" alt="App Logo">
      </div>
    </div>
    <div class="header-middle">
      <div class="app-name">Praveen-IPTV</div>
    </div>


    <div class="header-right">
        <select id="language" name="language" aria-label="Language">
            <option value="">Language</option>
            <option value="asm">Assamese</option>
            <option value="ben">Bengali</option>
            <option value="bho">Bhojpuri</option>
            <option value="eng">English</option>
            <option value="hin">Hindi</option>
            <option value="kan">Kannada</option>
            <option value="guj">Gujarati</option>
            <option value="mal">Malayalam</option>
            <option value="mar">Marathi</option>
            <option value="odi">Odia</option>
            <option value="pan">Punjabi</option>
            <option value="tam">Tamil</option>
            <option value="tel">Telugu</option>
            <option value="urd">Urdu</option>

        </select>
        <select id="category" name="category" aria-label="Category">
            <option value="">Category</option>
            <option value="divotional">Divotional</option>
            <option value="entertainment">Entertainment</option>
            <option value="health">Health</option>
            <option value="kids">Kids</option>
            <option value="news">News</option>
            <option value="nature">Nature</option>
            <option value="movies">Movies</option>
            <option value="music">Music</option>
            <option value="sports">Sports</option>
            <option value="travel">Travel</option>

        </select>
    </div>
</header>

  <!-- Main container -->
  <div class="main-container">
    <!-- Sidebar -->
    <aside class="sidebar">
        <h2 class="sidebar-header">Channels</h2>
        <div id="channel-list"></div>
        <div class="search-container">
            <input type="text" id="search" placeholder="Search channels...">
        </div>
    </aside>

    <!-- Video area -->
    <section class="video-area">
      <video id="player" controls autoplay></video>
      <div id="now-playing"></div>
    </section>
  </div>

  <!-- Footer -->
  <footer>
    Copy rights © bojja tekhub 2026
  </footer>

  <script>
    fetch("resource/channels.json?nocache=" + new Date().getTime())
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById("channel-list");
    const player = document.getElementById("player");
    const nowPlaying = document.getElementById("now-playing");
    const searchInput = document.getElementById("search");
    const languageSelect = document.getElementById("language");
    const categorySelect = document.getElementById("category");

    function renderChannels(list) {
      container.innerHTML = "";
      list.forEach(ch => {
        const item = document.createElement("div");
        item.className = "channel";
        item.innerHTML = `<div class="channel-name">${ch.name}</div>`;
        item.onclick = () => {
          if (ch.iptv_urls && ch.iptv_urls.length > 0) {
            player.src = ch.iptv_urls[0];
            player.play();
            nowPlaying.textContent = "Now Playing: " + ch.name;
          }
        };
        container.appendChild(item);
      });
    }

    function applyFilters() {
      const term = searchInput.value.toLowerCase();
      const lang = languageSelect.value;
      const cat = categorySelect.value;

      const filtered = data.filter(ch => {
        const matchesSearch = ch.name.toLowerCase().includes(term);
        const matchesLang = !lang || ch.language === lang;
        const matchesCat = !cat || ch.category === cat;
        return matchesSearch && matchesLang && matchesCat;
      });

      const sorted = [...filtered].sort((a, b) =>
        a.name.localeCompare(b.name, "en", { sensitivity: "base" })
      );

      renderChannels(sorted);
      return sorted;
    }

    // Initial render
    const initialList = applyFilters();

    // Auto-play first valid channel once
    const first = initialList.find(ch => ch.iptv_urls && ch.iptv_urls.length > 0);
    if (first) {
      player.src = first.iptv_urls[0];
      player.play();
      nowPlaying.textContent = "Now Playing: " + first.name;
    }

    // Event listeners
    searchInput.addEventListener("input", () => renderChannels(applyFilters()));
    languageSelect.addEventListener("change", () => renderChannels(applyFilters()));
    categorySelect.addEventListener("change", () => renderChannels(applyFilters()));
  })
  .catch(err => console.error("Error loading playlist:", err));
  </script>
</body>
</html>
